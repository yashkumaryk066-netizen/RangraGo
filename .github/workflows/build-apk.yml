name: Build APK

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  # JOB 1: Pehle hi purani release delete karo — build se pehle
  delete-old-release:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Old Release Immediately
        run: |
          gh release delete latest --yes || true
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git temp-repo
          cd temp-repo && git push --delete origin latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # JOB 2: Naya APK banao aur upload karo
  build-and-release:
    runs-on: ubuntu-latest
    needs: delete-old-release
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: cd frontend && flutter pub get
      - run: cd frontend && flutter build apk --release

      - name: Rename APK
        run: mv frontend/build/app/outputs/flutter-apk/app-release.apk frontend/build/app/outputs/flutter-apk/RangraGo.apk

      - name: Upload New Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "RangraGo v1.0.1 (Latest)"
          files: frontend/build/app/outputs/flutter-apk/RangraGo.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
